spec:
  name: sherin
  services:
    - name: web
      environment_slug: node-js
      git:
        branch: main
        repo_clone_url: https://github.com/babysea-community/sherin-for-runway.git
      build_command: corepack enable && pnpm install --frozen-lockfile && pnpm build
      run_command: pnpm start -- -p $PORT
      envs:
        - key: NEXT_PUBLIC_SITE_URL
          scope: RUN_AND_BUILD_TIME
        - key: OWNER_EMAIL
          scope: RUN_TIME
        - key: NEXT_PUBLIC_SUPABASE_URL
          scope: RUN_AND_BUILD_TIME
        - key: NEXT_PUBLIC_SUPABASE_PUBLIC_KEY
          scope: RUN_AND_BUILD_TIME
        - key: SUPABASE_SECRET_KEY
          scope: RUN_TIME
          type: SECRET
        - key: INFERENCE_PROVIDER
          scope: RUN_TIME
          value: runway
        - key: RUNWAYML_API_SECRET
          scope: RUN_TIME
          type: SECRET
        - key: STORAGE_PROVIDER
          scope: RUN_TIME
          value: supabase-storage
        - key: CUSTOM_USER_STORAGE_QUOTA_GB
          scope: RUN_TIME
          value: '10'
