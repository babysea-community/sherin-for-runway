name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy-vercel:
    name: Vercel (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check secrets
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID not configured for this environment; skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        if: steps.check.outputs.deploy == 'true'
      - uses: pnpm/action-setup@v6
        if: steps.check.outputs.deploy == 'true'
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        if: steps.check.outputs.deploy == 'true'
        with:
          node-version: 24
          cache: pnpm
      - name: Install Vercel CLI
        if: steps.check.outputs.deploy == 'true'
        run: pnpm add -g vercel@latest
      - name: Pull Vercel environment
        if: steps.check.outputs.deploy == 'true'
        env:
          VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment == 'preview' && 'preview' || 'production' }}
        run: |
          vercel pull --yes \
            --environment="$VERCEL_ENVIRONMENT" \
            --token "$VERCEL_TOKEN"
      - name: Check Sherin for Runway runtime environment
        if: steps.check.outputs.deploy == 'true'
        env:
          VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment == 'preview' && 'preview' || 'production' }}
        run: |
          node <<'NODE'
          const { existsSync, readFileSync } = require('node:fs');

          const required = [
            'NEXT_PUBLIC_SITE_URL',
            'OWNER_EMAIL',
            'NEXT_PUBLIC_SUPABASE_URL',
            'NEXT_PUBLIC_SUPABASE_PUBLIC_KEY',
            'SUPABASE_SECRET_KEY',
          ];
          const envName = process.env.VERCEL_ENVIRONMENT || 'production';
          const file = `.vercel/.env.${envName}.local`;

          if (!existsSync(file)) {
            console.error(`::error::Vercel environment file was not pulled: ${file}`);
            process.exit(1);
          }

          const env = Object.create(null);

          for (const line of readFileSync(file, 'utf8').split(/\r?\n/)) {
            const trimmed = line.trim();

            if (!trimmed || trimmed.startsWith('#')) {
              continue;
            }

            const separator = trimmed.indexOf('=');

            if (separator === -1) {
              continue;
            }

            const name = trimmed.slice(0, separator).trim();
            let value = trimmed.slice(separator + 1).trim();

            if (
              (value.startsWith('"') && value.endsWith('"')) ||
              (value.startsWith("'") && value.endsWith("'"))
            ) {
              value = value.slice(1, -1);
            }

            env[name] = value;
          }

          const missing = required.filter((name) => !env[name]?.trim());

          if (missing.length > 0) {
            console.error(
              `::error::Missing required Sherin for Runway Vercel ${envName} env vars: ${missing.join(', ')}`,
            );
            process.exit(1);
          }

          validateUrl(env.NEXT_PUBLIC_SITE_URL, 'NEXT_PUBLIC_SITE_URL');
          validateUrl(env.NEXT_PUBLIC_SUPABASE_URL, 'NEXT_PUBLIC_SUPABASE_URL');
          validateEmail(env.OWNER_EMAIL, 'OWNER_EMAIL');

          const inferenceProvider = (env.INFERENCE_PROVIDER?.trim() || 'runway').toLowerCase();

          if (!['runway', 'babysea'].includes(inferenceProvider)) {
            console.error('::error::INFERENCE_PROVIDER must be runway or babysea.');
            process.exit(1);
          }

          if (
            inferenceProvider === 'runway' &&
            !env.RUNWAYML_API_SECRET?.trim() &&
            !env.RUNWAY_API_KEY?.trim()
          ) {
            console.error('::error::INFERENCE_PROVIDER=runway requires RUNWAYML_API_SECRET or RUNWAY_API_KEY.');
            process.exit(1);
          }

          if (inferenceProvider === 'babysea') {
            if (!env.BABYSEA_API_KEY?.trim()) {
              console.error('::error::INFERENCE_PROVIDER=babysea requires BABYSEA_API_KEY.');
              process.exit(1);
            }

            if (env.BABYSEA_API_BASE_URL?.trim()) {
              const babyseaUrl = validateUrl(env.BABYSEA_API_BASE_URL, 'BABYSEA_API_BASE_URL');
              const babyseaHost = babyseaUrl.hostname.toLowerCase();

              if (!['api.us.babysea.ai', 'api.eu.babysea.ai', 'api.jp.babysea.ai'].includes(babyseaHost)) {
                console.error('::error::BABYSEA_API_BASE_URL must be a BabySea API host.');
                process.exit(1);
              }
            }
          }

          const storageProvider = (env.STORAGE_PROVIDER?.trim() || 'supabase-storage').toLowerCase();

          if (!['supabase-storage', 'vercel-blob', 'cloudflare-r2', 'aws-s3'].includes(storageProvider)) {
            console.error('::error::STORAGE_PROVIDER must be supabase-storage, vercel-blob, cloudflare-r2, or aws-s3.');
            process.exit(1);
          }

          if (storageProvider === 'vercel-blob') {
            requireEnv(['BLOB_READ_WRITE_TOKEN'], storageProvider);
          }

          if (storageProvider === 'cloudflare-r2') {
            requireEnv(
              [
                'CLOUDFLARE_R2_ACCOUNT_ID',
                'CLOUDFLARE_R2_ACCESS_KEY_ID',
                'CLOUDFLARE_R2_SECRET_ACCESS_KEY',
                'CLOUDFLARE_R2_BUCKET_NAME',
                'CLOUDFLARE_R2_ENDPOINT_URL',
                'CLOUDFLARE_R2_CUSTOM_DOMAIN_URL',
              ],
              storageProvider,
            );
            validateUrl(env.CLOUDFLARE_R2_ENDPOINT_URL, 'CLOUDFLARE_R2_ENDPOINT_URL');
            validateUrl(env.CLOUDFLARE_R2_CUSTOM_DOMAIN_URL, 'CLOUDFLARE_R2_CUSTOM_DOMAIN_URL');
          }

          if (storageProvider === 'aws-s3') {
            requireEnv(
              [
                'AWS_S3_REGION',
                'AWS_S3_ACCESS_KEY_ID',
                'AWS_S3_SECRET_ACCESS_KEY',
                'AWS_S3_BUCKET_NAME',
                'AWS_S3_ENDPOINT_URL',
              ],
              storageProvider,
            );
            validateUrl(env.AWS_S3_ENDPOINT_URL, 'AWS_S3_ENDPOINT_URL');
          }

          if (
            env.CUSTOM_USER_STORAGE_QUOTA_GB?.trim() &&
            !/^[1-9][0-9]*$/.test(env.CUSTOM_USER_STORAGE_QUOTA_GB.trim())
          ) {
            console.error('::error::CUSTOM_USER_STORAGE_QUOTA_GB must be a positive integer.');
            process.exit(1);
          }

          console.log(`Sherin for Runway Vercel ${envName} environment has required runtime variables.`);

          function requireEnv(names, label) {
            const missing = names.filter((name) => !env[name]?.trim());

            if (missing.length > 0) {
              console.error(
                `::error::STORAGE_PROVIDER=${label} requires ${missing.join(', ')}.`,
              );
              process.exit(1);
            }
          }

          function validateEmail(value, name) {
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
              console.error(`::error::${name} must be a valid email address.`);
              process.exit(1);
            }
          }

          function validateUrl(value, name) {
            let url;

            try {
              url = new URL(value);
            } catch {
              console.error(`::error::${name} must be a valid URL.`);
              process.exit(1);
            }

            if (url.protocol !== 'https:') {
              console.error(`::error::${name} must use HTTPS.`);
              process.exit(1);
            }

            return url;
          }
          NODE
      - name: Build
        if: steps.check.outputs.deploy == 'true'
        run: |
          vercel build ${{ (github.event_name == 'push' || github.event.inputs.environment == 'production') && '--prod' || '' }} \
            --token "$VERCEL_TOKEN"
      - name: Deploy
        if: steps.check.outputs.deploy == 'true'
        run: |
          vercel deploy --prebuilt ${{ (github.event_name == 'push' || github.event.inputs.environment == 'production') && '--prod' || '' }} \
            --token "$VERCEL_TOKEN"
